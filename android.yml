name: Build SplitX APK
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Make gradlew executable
        run: chmod +x gradlew
      - name: Build Debug APK
        run: ./gradlew assembleDebug -p splitx
      - uses: actions/upload-artifact@v4
        with:
          name: SplitX-APK
          path: splitx/app/build/outputs/apk/debug/app-debug.apk
